version: "3"

services:
  concourse-worker:
    image: concourse/concourse:8.1.1@sha256:ecfb693fe2a60f1126965565ec489d6acb5d0d9ddd35508eeac5ff193520ae14
    restart: unless-stopped
    command: worker
    stop_signal: SIGUSR2
    ports:
      - "8888:8888"
    privileged: true
    volumes:
      - type: bind
        source: /opt/concourse/keys/worker
        target: /concourse-keys
      - type: bind
        source: /opt/concourse/worker-state # create this dir on the host first
        target: /worker-state
    env_file:
      - path: .worker.env
        required: true
    environment:
      CONCOURSE_TSA_HOST: ${CONCOURSE_TSA_HOST_EXTERNAL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    networks:
      - default

networks:
  default:
    external: true
    name: thinknetwork
