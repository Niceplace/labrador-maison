# Tempo Configuration

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingest:
  enabled: true
  kafka:
    address: redpanda:9092
    topic: tempo-ingest

storage:
  trace:
    backend: local
    local:
      path: /data/tempo/traces
    wal:
      path: /data/tempo/wal

# Disable Kafka telemetry (enabled by default in Tempo 2.10+)
disable_kafka_telemetry: true
