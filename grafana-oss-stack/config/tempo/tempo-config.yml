# Tempo Configuration

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingest:
  enabled: true
  kafka:
    address: redpanda:9092
    topic: tempo-ingest
    disable_kafka_telemetry: true

storage:
  trace:
    backend: local
    local:
      path: /data/tempo/traces
    wal:
      path: /data/tempo/wal
