services:
  grafana:
    image: grafana/grafana@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    container_name: grafana
    restart: unless-stopped
    environment:
      - TZ=America/Toronto
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://grafana.thinkcenter.dev
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PROVISIONING_ENABLED=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.grafana.rule=Host(`grafana.thinkcenter.dev`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks:
      - thinknetwork
  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.prometheus.rule=Host(`prometheus.thinkcenter.dev`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.middlewares.prometheus-auth.basicauth.users=${PROMETHEUS_AUTH:-admin:$$apr1$$hash}
      - traefik.http.routers.prometheus.middlewares=prometheus-auth
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    networks:
      - thinknetwork
  loki:
    image: grafana/loki@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    container_name: loki
    restart: unless-stopped
    command: "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.loki.rule=Host(`loki.thinkcenter.dev`)
      - traefik.http.routers.loki.entrypoints=websecure
      - traefik.http.routers.loki.tls=true
      - traefik.http.services.loki.loadbalancer.server.port=3100
    networks:
      - thinknetwork
  tempo:
    image: grafana/tempo@sha256:9dc30bd8f976666fb78c6e7b523631acf74e4d6331096a6dbf97c0f10fe9651b
    container_name: tempo
    restart: unless-stopped
    command: "-config.file=/etc/tempo/config.yaml"
    volumes:
      - ./config/tempo/tempo-config.yml:/etc/tempo/config.yaml:ro
      - tempo-data:/data/tempo
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.tempo.rule=Host(`tempo.thinkcenter.dev`)
      - traefik.http.routers.tempo.entrypoints=websecure
      - traefik.http.routers.tempo.tls=true
      - traefik.http.services.tempo.loadbalancer.server.port=3200
    networks:
      - thinknetwork
  alloy:
    image: grafana/alloy@sha256:8f5666aebb871ba43ee2d65159c5d1c26c903720efafaf2d9ed4e237afc3bc88
    container_name: alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Docker access for container discovery and log collection
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # cAdvisor requires these for container metrics
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.alloy-otlp-http.rule=Host(`alloy-otlp.thinkcenter.dev`)
      - traefik.http.routers.alloy-otlp-http.entrypoints=websecure
      - traefik.http.routers.alloy-otlp-http.tls=true
      - traefik.http.services.alloy-otlp-http.loadbalancer.server.port=4318
    networks:
      - thinknetwork
    depends_on:
      - prometheus
      - loki
      - tempo
volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

networks:
  thinknetwork:
    external: true
    name: thinknetwork
