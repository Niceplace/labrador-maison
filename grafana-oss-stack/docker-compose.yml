services:
  grafana:
    image: grafana/grafana@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    container_name: grafana
    restart: unless-stopped
    environment:
      - TZ=America/Toronto
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://grafana.thinkcenter.dev
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PROVISIONING_ENABLED=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.grafana.rule=Host(`grafana.thinkcenter.dev`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - alloy.service.name=grafana-oss-stack-grafana
    networks:
      - thinknetwork
  prometheus:
    image: prom/prometheus@sha256:dda13e28bf95a5e5ca5b8ed56852006094c1c8e8871d9c9dbeed30aa6e55271f
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.prometheus.rule=Host(`prometheus.thinkcenter.dev`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.middlewares.prometheus-auth.basicauth.users=${PROMETHEUS_AUTH:-admin:$$apr1$$hash}
      - traefik.http.routers.prometheus.middlewares=prometheus-auth
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
      - alloy.service.name=grafana-oss-stack-prometheus
    networks:
      - thinknetwork
  loki:
    image: grafana/loki@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    container_name: loki
    restart: unless-stopped
    command: "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.loki.rule=Host(`loki.thinkcenter.dev`)
      - traefik.http.routers.loki.entrypoints=websecure
      - traefik.http.routers.loki.tls=true
      - traefik.http.services.loki.loadbalancer.server.port=3100
      - alloy.service.name=grafana-oss-stack-loki
    networks:
      - thinknetwork
  redpanda:
    image: redpandadata/redpanda:latest@sha256:65a7a93449f113a2941e0e8a9cd7eb1ed3ba153547b6b2b47f11796e9f754345
    container_name: redpanda
    restart: unless-stopped
    ports:
      - "9092:9092"
    command: >
      redpanda start --overprovisioned
      --mode=dev-container
      --kafka-addr=PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    networks:
      - thinknetwork
  tempo:
    depends_on:
      - redpanda
    image: grafana/tempo@sha256:f6c91b1f9e5d4b165e4a5ff5ee64b2fe80aac81b4d8879084d0b026d157be403
    container_name: tempo
    restart: unless-stopped
    command: "-config.file=/etc/tempo/config.yaml"
    volumes:
      - ./config/tempo/tempo-config.yml:/etc/tempo/config.yaml:ro
      - tempo-data:/data/tempo
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.tempo.rule=Host(`tempo.thinkcenter.dev`)
      - traefik.http.routers.tempo.entrypoints=websecure
      - traefik.http.routers.tempo.tls=true
      - traefik.http.services.tempo.loadbalancer.server.port=3200
      - alloy.service.name=grafana-oss-stack-tempo
    networks:
      - thinknetwork
  alloy:
    image: grafana/alloy@sha256:579582bce40049f2e27bd1e445000689c907a41f0495cb0d0c7f65609316ba7c
    container_name: alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Docker access for container discovery and log collection
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # cAdvisor requires these for container metrics
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      # HTTP router
      - traefik.http.routers.alloy-http.rule=Host(`alloy-otlp.thinkcenter.dev`)
      - traefik.http.routers.alloy-http.entrypoints=otlp-http
      - traefik.http.routers.alloy-http.tls=true
      - traefik.http.services.alloy-http.loadbalancer.server.port=4318
      - alloy.service.name=grafana-oss-stack-alloy
      # gRPC router (h2c for non-TLS HTTP/2)
      - traefik.http.routers.alloy-grpc.rule=Host(`alloy-otlp.thinkcenter.dev`)
      - traefik.http.routers.alloy-grpc.entrypoints=otlp-grpc
      - traefik.http.services.alloy-grpc.loadbalancer.server.port=4317
      - traefik.http.services.alloy-grpc.loadbalancer.server.scheme=h2c
    networks:
      - thinknetwork
    depends_on:
      - prometheus
      - loki
      - tempo
volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

networks:
  thinknetwork:
    external: true
    name: thinknetwork
