services:
  opencode-server:
    image: ghcr.io/anomalyco/opencode@sha256:2a8154bf48f06dfda30deddbd191eba5e2f8f6b3e01b17a720a23f04811225b3
    restart: no
    ports:
      - "4096:4096"
    command: "web --port 4096 --mdns --mdns-domain opencode.thinkcenter.dev --cors https://opencode.thinkcenter.dev"
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.opencode.rule=Host(`opencode.thinkcenter.dev`)
      - traefik.http.routers.opencode.entrypoints=websecure
      - traefik.http.routers.opencode.tls=true
      - traefik.http.services.opencode.loadbalancer.server.port=4096
    environment:
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_CONFIG_DIR: /etc/opencode/config
      # OPENCODE_SERVER_USERNAME will be injected at deploy time via Komodo
    volumes:
      - type: bind
        source: ./opencode.jsonc
        target: /etc/opencode/config/opencode.jsonc
      - type: bind
        source: ~/workspace/personal/private-config/ai-tooling-config/skills
        target: /etc/opencode/config/skills
        read_only: true
      - type: bind
        source: ~/workspace/personal/private-config/ai-tooling-config/agents
        target: /etc/opencode/config/agents
        read_only: true
      - type: bind
        source: ~/workspace/personal/private-config/ai-tooling-config/commands
        target: /etc/opencode/config/commands
        read_only: true
      - type: bind
        source: ~/workspace/ai-support
        target: /workspace/ai-support
        read_only: true
    networks:
      - thinknetwork
networks:
  thinknetwork:
    name: thinknetwork
    external: true
