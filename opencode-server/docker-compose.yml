services:
  opencode-server:
    image: ghcr.io/anomalyco/opencode@sha256:74c768e5d141b64b7a6e47afa32c3bd368a3dff5a52640716e9f266aa54aa42b
    restart: no
    ports:
      - "4096:4096"
    command: "web --port 4096 --mdns --mdns-domain opencode.thinkcenter.dev --cors https://opencode.thinkcenter.dev"
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.opencode.rule=Host(`opencode.thinkcenter.dev`)
      - traefik.http.routers.opencode.entrypoints=websecure
      - traefik.http.routers.opencode.tls=true
      - traefik.http.services.opencode.loadbalancer.server.port=4096
    env_file:
      - path: .server.env
        required: true
      - path: .secrets.env
        required: true
    volumes:
      - type: bind
        source: ./opencode.jsonc
        target: ${OPENCODE_CONFIG}
      - type: bind
        source: /opt/ai-tooling
        target: ${OPENCODE_CONFIG_DIR}
        read_only: true
      - type: bind
        source: /opt/ai-support
        target: /workspace/ai-support
        read_only: true
    networks:
      - thinknetwork
networks:
  thinknetwork:
    name: thinknetwork
    external: true
