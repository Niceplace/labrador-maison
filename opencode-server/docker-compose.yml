services:
  opencode-server:
    image: ghcr.io/anomalyco/opencode
    ports:
      - name: web
        target: 4096
        host_ip: 0.0.0.0
        published: "4096"
        protocol: tcp
        app_protocol: http
        mode: host
    entrypoint:
      - opencode
      - web
      - --port 4096
      - --hostname 0.0.0.0
      - --mdns true
      - --mdns-domain opencode.thinkcenter.dev
      - --cors https://opencode.thinkcenter.dev
    labels:
      - traefik.enable=true
      - traefik.docker.network=thinknetwork
      - traefik.http.routers.opencode.rule=Host(`opencode.thinkcenter.dev`)
      - traefik.http.routers.opencode.entrypoints=websecure
      - traefik.http.routers.opencode.tls=true
      - traefik.http.services.opencode.loadbalancer.server.port=4096
    env:
      OPENCODE_SERVER_USERNAME: opencode
    networks:
      - thinknetwork
networks:
  thinknetwork:
    name: thinknetwork
    external: true
